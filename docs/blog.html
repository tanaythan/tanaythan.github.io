<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanay Nathan</title>
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', s || (d ? 'dark' : 'light'));
    })();
  </script>
  <link rel="stylesheet" href="/_colors.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/">~/tanay</a>
    <nav class="site-nav">
      <a href="/"        >~</a>
      <!-- <a href="/blog"        class="active">blog</a> -->
      <!-- <a href="/projects">projects</a> -->
      <!-- <a href="/resume"  >resume</a> -->
      <button id="theme-toggle" aria-label="Toggle dark mode" onclick="
        var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      "></button>
    </nav>
  </header>

  <main class="content">
        <h1 class="page-title">
      <span class="prompt">❯</span> Blog
    </h1>
    
    
  </main>

  <footer class="site-footer">
    <span class="muted">Tanay Nathan &copy; 2026 — built with pandoc, markdown, &amp; bash</span>
  </footer>
</body>
</html>
